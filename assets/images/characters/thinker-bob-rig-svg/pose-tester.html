<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>THINKer Bob Pose Tester</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#101827; color:#eef7ff; }
    body { margin:0; display:grid; grid-template-columns:220px 1fr; min-height:100vh; }
    aside { padding:20px; background:#162235; box-shadow:4px 0 18px #0006; }
    h1 { margin:0 0 8px; font-size:20px; } p { color:#a9bdd2; font-size:13px; }
    button { width:100%; margin:5px 0; padding:10px; border:1px solid #3f607d; border-radius:8px; background:#203852; color:white; cursor:pointer; }
    button:hover { background:#2a4b6d; }
    main { display:grid; place-items:center; overflow:hidden; background:radial-gradient(circle,#375570 0,#172536 50%,#0b111b 100%); }
    #stage { width:min(70vw,620px); aspect-ratio:389/582; }
    #stage svg { width:100%; height:100%; overflow:visible; filter:drop-shadow(0 20px 12px #0008); }
    code { color:#6cecff; }
  </style>
</head>
<body>
  <aside>
    <h1>THINKer Bob</h1>
    <p>Pivot and pose verification</p>
    <button data-pose="neutral">Neutral</button>
    <button data-pose="wave">Wave</button>
    <button data-pose="walkA">Walk A</button>
    <button data-pose="walkB">Walk B</button>
    <button data-pose="seated">Seated</button>
    <button data-pose="tool">Hold Tool</button>
    <button data-pose="blink">Blink</button>
    <p id="status">Loading rig…</p>
  </aside>
  <main><div id="stage"></div></main>
  <script>
    const rotations = {
      neutral: {},
      wave: {'right-shoulder':82,'right-upper-arm':12,'right-lower-arm':-48,'right-hand':-12,'head':5},
      walkA: {'right-upper-leg':22,'right-knee':-16,'right-lower-leg':-10,'left-upper-leg':-20,'left-knee':30,'left-lower-leg':18,'right-shoulder':-8,'left-shoulder':10},
      walkB: {'right-upper-leg':-20,'right-knee':30,'right-lower-leg':18,'left-upper-leg':22,'left-knee':-16,'left-lower-leg':-10,'right-shoulder':10,'left-shoulder':-8},
      seated: {'right-upper-leg':58,'right-knee':-76,'right-lower-leg':-8,'right-foot':12,'left-upper-leg':-58,'left-knee':76,'left-lower-leg':8,'left-foot':-12,'right-shoulder':10,'left-shoulder':-10,'right-lower-arm':-30,'left-lower-arm':30},
      tool: {'right-shoulder':-42,'right-upper-arm':8,'right-lower-arm':-50,'right-hand':20,'left-shoulder':42,'left-upper-arm':-8,'left-lower-arm':50,'left-hand':-20,'head':4},
      blink: {}
    };
    function pose(name) {
      document.querySelectorAll('.joint').forEach(el => el.style.setProperty('--rotation','0deg'));
      document.querySelector('#eyes')?.style.setProperty('--blink', name === 'blink' ? '.08' : '1');
      Object.entries(rotations[name]).forEach(([id,value]) => document.getElementById(id)?.style.setProperty('--rotation',`${value}deg`));
      document.getElementById('status').textContent = `Pose: ${name}`;
    }
    fetch('thinker-bob-rig.svg').then(r=>r.text()).then(svg=>{
      document.getElementById('stage').innerHTML=svg;
      document.querySelectorAll('button').forEach(b=>b.onclick=()=>pose(b.dataset.pose));
      pose('neutral');
    });
  </script>
</body>
</html>
