<!DOCTYPE html>
<html>
<head>
  <title>Bobwarts Build World</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    canvas { display: block; }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,.9);
      padding: 15px;
      border-radius: 10px;
      z-index: 100;
      max-width: 300px;
    }
  </style>
</head>

<body>
<div id="info">
  <h2>🏰 Bobwarts Build World</h2>
<p><b>Mission:</b> Build a Wizard Castle!</p>

<p>⭐ Challenge:</p>

<ul>
  <li>Add 4 towers</li>
  <li>Create a grand entrance</li>
  <li>Build a dragon perch</li>
</ul>
  <p>Use your mouse to look around.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const groundGeometry = new THREE.BoxGeometry(50,1,50);
const groundMaterial = new THREE.MeshLambertMaterial({color:0x55aa55});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.position.y = -1;
scene.add(ground);

for(let x=-5;x<=5;x+=2){
  for(let z=-5;z<=5;z+=2){
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(),
      new THREE.MeshLambertMaterial({color:0xcccccc})
    );
    cube.position.set(x,0,z);
    scene.add(cube);
  }
}

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

camera.position.set(0,8,15);
let angle = 0;
let mouseX = 0;
let mouseY = 0;

document.addEventListener('mousemove', (event)=>{

  mouseX = (event.clientX / window.innerWidth - 0.5) * 30;
  mouseY = (event.clientY / window.innerHeight - 0.5) * 10;

  camera.position.x = mouseX;
  camera.position.y = 8 - mouseY;

  camera.lookAt(0,0,0);

});
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}

animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
